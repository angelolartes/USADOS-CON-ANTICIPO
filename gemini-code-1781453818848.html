<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Automobili Group</title>
    
    <!-- Soporte PWA e iOS Móvil -->
    <meta name="theme-color" content="#450a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Icono.png">
    <link rel="manifest" href="manifest.json">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías de lectura Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fef2f2', 900: '#450a0a', 950: '#1c0202' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-full flex flex-col font-sans selection:bg-red-800 selection:text-white">

    <!-- BARRA SUPERIOR ROJO OSCURO PREMIUM -->
    <header class="sticky top-0 z-40 bg-gradient-to-r from-red-950 via-red-900 to-rose-950 border-b border-red-900/40 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <!-- LOGO DE LA AGENCIA (Icono.png) -->
                <div class="bg-white p-1 rounded-xl shadow-inner flex items-center justify-center overflow-hidden w-12 h-12 border border-red-800/20 shrink-0">
                    <img src="Icono.png" alt="Logo AG" class="w-full h-full object-contain" onerror="this.src='https://placehold.co/100x100/ffffff/450a0a?text=AG'">
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-wider text-white flex items-center gap-2">
                        AUTOMOBILI <span class="bg-red-600/30 text-red-200 text-xxs font-bold px-2 py-0.5 rounded border border-red-500/30">GESTOR</span>
                    </h1>
                    <p class="text-xs text-red-200/70 font-medium">Panel de Control Interno de Stock</p>
                </div>
            </div>

            <!-- Botones de Acción de la Barra -->
            <div class="flex items-center gap-2">
                <label class="cursor-pointer flex items-center gap-1.5 bg-emerald-700 hover:bg-emerald-600 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-lg shadow-emerald-900/30 transition-all active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="hidden md:inline">Importar Excel</span>
                    <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileImport(event)">
                </label>

                <button onclick="exportToCSV()" class="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-xl text-xs font-bold border border-slate-700 shadow-lg transition-all active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="hidden md:inline">Exportar Planilla</span>
                </button>
                
                <!-- Botón de instalación PWA -->
                <button id="pwaInstallBtn" class="hidden flex items-center gap-1.5 bg-amber-600 hover:bg-amber-500 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-lg transition-all animate-pulse">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span>Instalar App</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 flex flex-col gap-6">
        
        <!-- DASHBOARD DE ESTADÍSTICAS -->
        <section id="dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700 flex items-center gap-3">
                <div class="p-3 bg-red-950 text-red-400 rounded-xl border border-red-900/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1a1 1 0 001-1v-4h3m-4 5h1a1 1 0 001-1v-5a1 1 0 00-1-1h-3m-6 0h6"></path></svg>
                </div>
                <div>
                    <p class="text-xxs text-slate-400 font-bold uppercase tracking-wider">Total Flota</p>
                    <h3 id="statTotalStock" class="text-xl font-black text-white">0</h3>
                </div>
            </div>
            <div class="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700 flex items-center gap-3">
                <div class="p-3 bg-emerald-950 text-emerald-400 rounded-xl border border-emerald-900/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-xxs text-slate-400 font-bold uppercase tracking-wider">Disponibles</p>
                    <h3 id="statAvailable" class="text-xl font-black text-emerald-400">0</h3>
                </div>
            </div>
            <div class="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700 flex items-center gap-3">
                <div class="p-3 bg-amber-950 text-amber-400 rounded-xl border border-amber-900/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-xxs text-slate-400 font-bold uppercase tracking-wider">Señados</p>
                    <h3 id="statSeñado" class="text-xl font-black text-amber-400">0</h3>
                </div>
            </div>
            <div class="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700 flex items-center gap-3">
                <div class="p-3 bg-slate-950 text-slate-400 rounded-xl border border-slate-900/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <div>
                    <p class="text-xxs text-slate-400 font-bold uppercase tracking-wider">Vendidos</p>
                    <h3 id="statVendido" class="text-xl font-black text-slate-400">0</h3>
                </div>
            </div>
        </section>

        <!-- FILTROS Y BUSCADOR -->
        <section class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-md">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="filterSearch" oninput="applyFilters()" placeholder="Buscar por modelo, patente..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-700 bg-slate-900 focus:outline-none focus:ring-2 focus:ring-red-700 transition-all text-sm text-white">
                </div>
                <div class="flex gap-2">
                    <select id="filterState" onchange="applyFilters()" class="px-3 py-2.5 rounded-xl border border-slate-700 bg-slate-900 focus:outline-none focus:ring-2 focus:ring-red-700 text-sm">
                        <option value="">Todos los estados</option>
                        <option value="DISPONIBLE">Disponibles</option>
                        <option value="SEÑADO">Señados</option>
                        <option value="VENDIDO">Vendidos</option>
                    </select>
                    <button onclick="openNewCarModal()" class="bg-red-700 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-xl text-sm transition-all active:scale-95 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span>Agregar Auto</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- SECCIÓN DE INVENTARIO -->
        <section class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-lg">
            <!-- Vista Tabla para comodidad en PC / Celular -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900/50 text-slate-400 text-xxs font-extrabold uppercase tracking-wider border-b border-slate-700">
                            <th class="py-4 px-4">Modelo / Patente</th>
                            <th class="py-4 px-4 hidden md:table-cell">Año / KM</th>
                            <th class="py-4 px-4">Precio / Anticipo</th>
                            <th class="py-4 px-4 text-center">Control de Estado</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody" class="divide-y divide-slate-700/60 text-sm">
                        <!-- Se llena dinámicamente -->
                    </tbody>
                </table>
            </div>
            
            <div id="emptyState" class="hidden text-center py-12 text-slate-500 flex flex-col items-center justify-center">
                <svg class="w-12 h-12 mb-2 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-4V8h4m-4 5V8h-4v5m0 0H8V8h4v5"></path></svg>
                <p class="font-bold">No hay vehículos registrados en este criterio.</p>
            </div>
        </section>
    </main>

    <!-- MODAL: AGREGAR NUEVO AUTO -->
    <div id="newCarModal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl max-w-md w-full overflow-hidden shadow-2xl">
            <div class="p-5 bg-gradient-to-r from-red-950 to-slate-900 border-b border-slate-700 flex justify-between items-center">
                <h3 class="font-black text-white text-base">Nuevo Ingreso a Stock</h3>
                <button onclick="closeNewCarModal()" class="text-slate-400 hover:text-white transition">✕</button>
            </div>
            <form id="newCarForm" onsubmit="saveNewCar(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Modelo Completo</label>
                    <input type="text" id="addModelo" required placeholder="Ej: GOL POWER 1.6 3P" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Patente</label>
                        <input type="text" id="addPatente" required placeholder="Ej: AB123CD" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600 uppercase">
                    </div>
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Año</label>
                        <input type="number" id="addAnio" required placeholder="2018" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Kilómetros</label>
                        <input type="number" id="addKm" required placeholder="125000" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Combustible</label>
                        <select id="addCombustible" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                            <option value="NAFTA">Nafta</option>
                            <option value="DIESEL">Diésel</option>
                            <option value="GNC">GNC</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Precio Total ($)</label>
                        <input type="number" id="addPrecio" required placeholder="12500000" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                    <div>
                        <label class="block text-xxs font-bold text-slate-400 uppercase mb-1">Anticipo ($)</label>
                        <input type="number" id="addAnticipo" required placeholder="6500000" class="w-full px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg">
                    Guardar Vehículo en Stock
                </button>
            </form>
        </div>
    </div>

    <script>
        // Flota por defecto precargada (Para respaldo)
        const fallbackData = [
            { MODELO: "GOL POWER 1.6", PATENTE: "FHJ500", COMBUSTIBLE: "NAFTA", "AÑO": "2006", KILOMETROS: "148000", PRECIO: "7800000", ANTICIPO: "3500000", DISPONIBILIDAD: "DISPONIBLE" },
            { MODELO: "CHEVROLET MERIVA 1.7 GL DTI", PATENTE: "FAL265", COMBUSTIBLE: "DIESEL", "AÑO": "2005", KILOMETROS: "163000", PRECIO: "8500000", ANTICIPO: "4000000", DISPONIBILIDAD: "DISPONIBLE" },
            { MODELO: "VENTO 2.0 TSI SPORTLINE", PATENTE: "PKE063", COMBUSTIBLE: "NAFTA", "AÑO": "2015", KILOMETROS: "85000", PRECIO: "23500000", ANTICIPO: "13230000", DISPONIBILIDAD: "SEÑADO" },
            { MODELO: "OROCH 1.6 DYNAMIQUE", PATENTE: "AD933UN", COMBUSTIBLE: "NAFTA", "AÑO": "2019", KILOMETROS: "150000", PRECIO: "20500000", ANTICIPO: "10680000", DISPONIBILIDAD: "DISPONIBLE" }
        ];

        let stock = [];

        window.addEventListener('DOMContentLoaded', () => {
            // Registrar Service Worker para PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log("Service Worker Activo"))
                    .catch(err => console.log("Error de SW: ", err));
            }

            // Cargar datos desde LocalStorage o usar fallback
            const savedStock = localStorage.getItem('ag_inventario_stock');
            if (savedStock) {
                stock = JSON.parse(savedStock);
                renderStock(stock);
            } else {
                processRawData(fallbackData);
            }
        });

        // Captura botón de instalación PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        document.getElementById('pwaInstallBtn').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('pwaInstallBtn').classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        });

        function processRawData(rows) {
            stock = rows.map((row, i) => {
                const getVal = (names) => {
                    const match = Object.keys(row).find(k => names.includes(k.trim().toUpperCase()));
                    return match ? row[match] : "";
                };

                let precio = parseFloat(String(getVal(["PRECIO", "PRECIO TOTAL"])).replace(/[^0-9]/g, '')) || 0;
                let anticipo = parseFloat(String(getVal(["ANTICIPO", "ANTICIPO SUGERIDO"])).replace(/[^0-9]/g, '')) || 0;
                let anio = parseInt(getVal(["AÑO", "ANIO", "AÑO "])) || 2010;
                let km = parseInt(String(getVal(["KILOMETROS", "KM", "KILÓMETROS"])).replace(/[^0-9]/g, '')) || 0;

                return {
                    id: `car-${i}-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    modelo: (getVal(["MODELO", "VEHICULO"]) || "Sin Especificar").toUpperCase(),
                    patente: (getVal(["PATENTE", "DOMINIO"]) || `S/P-${i}`).toUpperCase().trim(),
                    combustible: (getVal(["COMBUSTIBLE"]) || "NAFTA").toUpperCase(),
                    anio: anio,
                    kilometros: km,
                    precio: precio,
                    anticipo: anticipo,
                    disponibilidad: (getVal(["DISPONIBILIDAD", "ESTADO"]) || "DISPONIBLE").toUpperCase().trim()
                };
            }).filter(c => c.modelo !== "SIN ESPECIFICAR");

            saveAndSync();
        }

        function handleFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            if (file.name.endsWith('.csv')) {
                reader.onload = function(evt) {
                    Papa.parse(evt.target.result, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(res) { processRawData(res.data); }
                    });
                };
                reader.readAsText(file);
            } else {
                reader.onload = function(evt) {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    processRawData(json);
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function saveAndSync() {
            localStorage.setItem('ag_inventario_stock', JSON.stringify(stock));
            calculateDashboard();
            applyFilters();
        }

        function calculateDashboard() {
            document.getElementById('statTotalStock').innerText = stock.length;
            document.getElementById('statAvailable').innerText = stock.filter(c => c.disponibilidad === "DISPONIBLE").length;
            document.getElementById('statSeñado').innerText = stock.filter(c => c.disponibilidad === "SEÑADO").length;
            document.getElementById('statVendido').innerText = stock.filter(c => c.disponibilidad === "VENDIDO").length;
        }

        function renderStock(carsToRender) {
            const tbody = document.getElementById('inventoryTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = "";

            if (carsToRender.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            carsToRender.forEach(car => {
                let rowBg = "hover:bg-slate-800/40";
                let badgeStyle = "bg-emerald-950 text-emerald-400 border-emerald-800/50";
                
                if (car.disponibilidad === "SEÑADO") {
                    badgeStyle = "bg-amber-950 text-amber-400 border-amber-800/50";
                } else if (car.disponibilidad === "VENDIDO") {
                    badgeStyle = "bg-slate-900 text-slate-500 border-slate-800";
                    rowBg = "bg-slate-900/30 text-slate-500 line-through decoration-slate-700";
                }

                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-800 transition-colors ${rowBg}`;
                tr.innerHTML = `
                    <td class="py-3 px-4">
                        <div class="font-bold text-white">${car.modelo}</div>
                        <div class="font-mono text-xs text-slate-400 mt-0.5 flex items-center gap-2">
                            <span class="bg-slate-900 px-1.5 py-0.5 rounded border border-slate-700">${car.patente}</span>
                            <span class="md:hidden">• ${car.anio} • ${car.kilometros.toLocaleString()} km</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 hidden md:table-cell">
                        <div class="font-semibold text-slate-200">${car.anio}</div>
                        <div class="text-xs text-slate-400">${car.kilometros.toLocaleString()} km • ${car.combustible}</div>
                    </td>
                    <td class="py-3 px-4">
                        <div class="font-black text-white">$${car.precio.toLocaleString('es-AR')}</div>
                        <div class="text-xs text-slate-400">Ant: $${car.anticipo.toLocaleString('es-AR')}</div>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex flex-col sm:flex-row items-center justify-center gap-1">
                            <button onclick="updateState('${car.id}', 'DISPONIBLE')" class="w-full sm:w-auto px-2 py-1 text-xxs font-bold rounded-md transition-all ${car.disponibilidad === 'DISPONIBLE' ? 'bg-emerald-600 text-white' : 'bg-slate-900 hover:bg-slate-700 text-slate-400'}">DISP.</button>
                            <button onclick="updateState('${car.id}', 'SEÑADO')" class="w-full sm:w-auto px-2 py-1 text-xxs font-bold rounded-md transition-all ${car.disponibilidad === 'SEÑADO' ? 'bg-amber-600 text-slate-900' : 'bg-slate-900 hover:bg-slate-700 text-slate-400'}">SEÑAR</button>
                            <button onclick="updateState('${car.id}', 'VENDIDO')" class="w-full sm:w-auto px-2 py-1 text-xxs font-bold rounded-md transition-all ${car.disponibilidad === 'VENDIDO' ? 'bg-slate-700 text-white' : 'bg-slate-900 hover:bg-slate-700 text-slate-400'}">VENDIDO</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateState(id, newState) {
            const index = stock.findIndex(c => c.id === id);
            if (index !== -1) {
                stock[index].disponibilidad = newState;
                saveAndSync();
            }
        }

        function applyFilters() {
            const q = document.getElementById('filterSearch').value.toLowerCase().trim();
            const state = document.getElementById('filterState').value;

            const res = stock.filter(c => {
                const matchQ = c.modelo.toLowerCase().includes(q) || c.patente.toLowerCase().includes(q);
                const matchS = !state || c.disponibilidad === state;
                return matchQ && matchS;
            });

            renderStock(res);
        }

        function exportToCSV() {
            if(stock.length === 0) return;
            const headers = ["MODELO", "PATENTE", "AÑO", "KILOMETROS", "COMBUSTIBLE", "PRECIO", "ANTICIPO", "DISPONIBILIDAD"];
            const rows = stock.map(c => [c.modelo, c.patente, c.anio, c.kilometros, c.combustible, c.precio, c.anticipo, c.disponibilidad]);
            
            let csvContent = "data:text/csv;charset=utf-8," 
                + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `INVENTARIO_ACTUALIZADO_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openNewCarModal() { document.getElementById('newCarModal').classList.remove('hidden'); }
        function closeNewCarModal() { document.getElementById('newCarModal').classList.add('hidden'); }

        function saveNewCar(e) {
            e.preventDefault();
            const n = {
                id: `car-manual-${Date.now()}`,
                modelo: document.getElementById('addModelo').value.toUpperCase(),
                patente: document.getElementById('addPatente').value.toUpperCase().trim(),
                anio: parseInt(document.getElementById('addAnio').value) || 2020,
                kilometros: parseInt(document.getElementById('addKm').value) || 0,
                combustible: document.getElementById('addCombustible').value,
                precio: parseFloat(document.getElementById('addPrecio').value) || 0,
                anticipo: parseFloat(document.getElementById('addAnticipo').value) || 0,
                disponibilidad: "DISPONIBLE"
            };
            stock.unshift(n);
            document.getElementById('newCarForm').reset();
            closeNewCarModal();
            saveAndSync();
        }
    </script>
</body>
</html>
